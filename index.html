<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> KanbanSpace | Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="user-profile" id="user-profile" onclick="changeUser()">
                <span>Sincronizando...</span>
            </div>
            <div class="search-container">
                <input type="text" id="board-search" placeholder="Filtrar tarefas ou @nicks..." oninput="renderBoard()">
            </div>
        </div>
        <div class="actions">
            <button class="btn-share" onclick="shareBoard()">Compartilhar Plano</button>
        </div>
    </header>
    <main id="kanban-board" class="board-container"></main>
    <div id="log-panel" class="log-panel">
        <div class="log-header">Histórico de Atividade</div>
        <div id="log-content" class="log-content"></div>
    </div>
</body>
</html>
