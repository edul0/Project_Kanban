<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Space|Ecosystem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="user-profile" id="user-profile" onclick="changeUser()" title="Clique para trocar de usuário">

    <script src="script.js" defer></script>
</body>
</html>
