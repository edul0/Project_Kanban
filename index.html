<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kanban Space | Realtime Ecosystem</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="user-profile" id="user-profile" onclick="changeUser()" title="Clique para trocar de usuário">
            <div class="skeleton-avatar"></div>
            <span>Sincronizando banco...</span>
        </div>
        <div class="actions">
            <button class="btn-share" onclick="shareBoard()">Compartilhar Plano</button>
        </div>
    </header>

    <main id="kanban-board" class="board-container"></main>
</body>
</html>
